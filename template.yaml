AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Palavbot backend - Lambda container behind HTTP API, validating JWTs from an externally-managed Cognito User Pool.

Parameters:
  StackName:
    Type: String
    Default: palavbot
  ImageUri:
    Type: String
    Description: Full ECR image URI (repo:tag) for the Lambda container image.
  OpenAIKeyParamName:
    Type: String
    Default: /palavbot/openai_api_key
    Description: SSM SecureString parameter holding the OpenAI API key.
  CorsOrigin:
    Type: String
    Default: "*"
    Description: Frontend origin allowed by CORS (set to production URL pre-launch).
  LogRetentionDays:
    Type: Number
    Default: 7
  CognitoUserPoolId:
    Type: String
    Description: >
      ID of the externally-managed Cognito User Pool whose JWTs the API trusts
      (e.g. us-east-1_XXXXXXXXX). This stack does NOT create or own the pool.
    AllowedPattern: "^[a-z0-9-]+_[A-Za-z0-9]+$"
  CognitoAudiences:
    Type: CommaDelimitedList
    Description: >
      Comma-separated list of Cognito App Client IDs (audiences) whose ID
      tokens the API accepts. Typically one per app client that will be
      issuing JWTs forwarded to palavbot.

Globals:
  Function:
    Timeout: 30
    MemorySize: 1024
    Architectures: [arm64]
    Tracing: Active

Resources:
  PalavbotFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub ${StackName}-api
      PackageType: Image
      ImageUri: !Ref ImageUri
      ReservedConcurrentExecutions: 5
      Environment:
        Variables:
          PALAV_CORS_ORIGINS: !Ref CorsOrigin
          PALAV_OPENAI_KEY_SSM_PARAM: !Ref OpenAIKeyParamName
          LOG_LEVEL: INFO
      Policies:
        - Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Action:
                - ssm:GetParameter
              Resource: !Sub arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter${OpenAIKeyParamName}
            - Effect: Allow
              Action:
                - kms:Decrypt
              Resource: !Sub arn:${AWS::Partition}:kms:${AWS::Region}:${AWS::AccountId}:alias/aws/ssm
      Events:
        ChatRoute:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /chat
            Method: POST
        HealthRoute:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /healthz
            Method: GET
            Auth:
              Authorizer: NONE

  PalavbotLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${StackName}-api
      RetentionInDays: !Ref LogRetentionDays

  HttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: prod
      CorsConfiguration:
        AllowOrigins: [!Ref CorsOrigin]
        AllowHeaders: [authorization, content-type]
        AllowMethods: [GET, POST, OPTIONS]
        MaxAge: 600
      Auth:
        DefaultAuthorizer: CognitoJwt
        Authorizers:
          CognitoJwt:
            IdentitySource: $request.header.Authorization
            JwtConfiguration:
              issuer: !Sub https://cognito-idp.${AWS::Region}.amazonaws.com/${CognitoUserPoolId}
              audience: !Ref CognitoAudiences

Outputs:
  ApiUrl:
    Description: Base URL for the HTTP API.
    Value: !Sub https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com
  FunctionName:
    Value: !Ref PalavbotFunction
  TrustedUserPoolId:
    Description: Cognito User Pool whose JWTs this deployment trusts (external; not owned by this stack).
    Value: !Ref CognitoUserPoolId
