name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  STACK_NAME: palavbot
  ECR_REPOSITORY: palavbot
  OPENAI_KEY_PARAM: /palavbot/openai_api_key

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run pytest (unit + integration)
        run: pytest tests/unit tests/integration -q

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Fetch OpenAI key for index build
        id: fetch-key
        run: |
          value=$(aws ssm get-parameter --name "$OPENAI_KEY_PARAM" --with-decryption --query Parameter.Value --output text)
          echo "::add-mask::$value"
          echo "OPENAI_API_KEY=$value" >> "$GITHUB_ENV"

      - name: Build FAISS index
        run: python build_index.py

      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr

      - name: Ensure ECR repository
        run: |
          aws ecr describe-repositories --repository-names "$ECR_REPOSITORY" \
            || aws ecr create-repository --repository-name "$ECR_REPOSITORY" --image-scanning-configuration scanOnPush=true

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Build and push container image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/arm64
          provenance: false
          tags: |
            ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
            ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest

      - uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: Deploy with SAM (CloudFormation)
        run: |
          sam deploy \
            --stack-name "$STACK_NAME" \
            --region "$AWS_REGION" \
            --resolve-s3 \
            --capabilities CAPABILITY_IAM \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --image-repositories "PalavbotFunction=${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}" \
            --parameter-overrides \
              ImageUri=${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }} \
              CorsOrigin=${{ vars.PALAV_CORS_ORIGIN || '*' }} \
              OpenAIKeyParamName=${{ env.OPENAI_KEY_PARAM }}

      - name: Read stack outputs
        id: outputs
        run: |
          aws cloudformation describe-stacks --stack-name "$STACK_NAME" \
            --query "Stacks[0].Outputs" --output json > outputs.json
          echo "PALAV_API_URL=$(jq -r '.[] | select(.OutputKey=="ApiUrl").OutputValue' outputs.json)" >> "$GITHUB_ENV"
          echo "PALAV_USER_POOL_ID=$(jq -r '.[] | select(.OutputKey=="UserPoolId").OutputValue' outputs.json)" >> "$GITHUB_ENV"
          echo "PALAV_CLIENT_ID=$(jq -r '.[] | select(.OutputKey=="UserPoolClientId").OutputValue' outputs.json)" >> "$GITHUB_ENV"

      - name: Post-deploy smoke tests
        env:
          PALAV_TEST_USER: ${{ secrets.PALAV_TEST_USER }}
          PALAV_TEST_PASSWORD: ${{ secrets.PALAV_TEST_PASSWORD }}
        run: pytest tests/smoke -q
